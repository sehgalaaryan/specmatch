<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecMatch | Offline Admin</title>
    <meta name="description" content="Manage your SpecMatch device datasets locally with secure PBKDF2 authentication and Excel bulk tools.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div id="login-overlay">
        <div class="login-card enhanced" id="auth-card">
            <div id="login-view">
                <center>
                    <div class="login-badge">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                </center>
                <h2>Admin Access</h2>
                <p>Enter your security password to manage local datasets.</p>
                <form id="login-form">
                    <div class="form-group">
                        <label>Master Password</label>
                        <input type="password" id="admin-pass" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="login-btn" class="btn-primary w-full">Unlock Dashboard</button>
                </form>
                <p id="login-error" class="error-text" style="display: none;">Access Denied. Incorrect password.</p>
            </div>
        </div>
    </div>

    <!-- Nav Drawer Overlay -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <!-- Main Content -->
    <header class="glass">
        <div class="container nav-wrapper">
            <nav id="admin-nav" class="nav-wrapper" style="width: 100%;">
                <!-- Left: Unified Icon Unit + Split Text Link -->
                <div class="logo-area">
                    <button id="menu-toggle" class="logo-btn-integrated" aria-label="Toggle Navigation">
                        <!-- Truly Unified Brand Icon (Lines + S-Logo) -->
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <!-- Outer Tech Ring -->
                            <circle cx="12" cy="12" r="10" opacity="0.3"></circle>
                            <!-- Integrated S-Hamburger Path -->
                            <path d="M7 8h10M7 12h10M7 16h10" opacity="0.6"></path>
                            <!-- The 'S' curve formed as a single stroke connecting the lines -->
                            <path d="M8 8h8a2 2 0 1 1 0 4H8a2 2 0 1 0 0 4h8" stroke-width="3"></path>
                        </svg>
                    </button>
                    <a href="index.html" class="logo-text">SpecMatch</a>
                </div>

                <!-- Center: Desktop Nav -->
                <div class="center-nav">
                    <button class="nav-link active" data-category="mobile">Mobiles</button>
                    <button class="nav-link" data-category="tablet">Tablets</button>
                    <button class="nav-link" data-category="laptop">Laptops</button>
                </div>
                
                <div class="action-cluster">
                    <!-- Theme Switcher -->
                    <div class="theme-switcher">
                        <button class="theme-btn active" id="btn-light" title="Light Mode">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        </button>
                        <button class="theme-btn" id="btn-dark" title="Dark Mode">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                        </button>
                        <button class="theme-btn" id="btn-vibrant" title="Vibrant Mode">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                        </button>
                    </div>

                    <button id="logout-btn" class="admin-action-btn">Lock</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Mobile Navigation Drawer -->
    <div id="nav-drawer" class="nav-drawer glass">
        <div class="drawer-header">
            <a href="index.html" class="drawer-logo">SpecMatch</a>
            <button id="menu-toggle-drawer" class="logo-btn-integrated is-active" aria-label="Close Navigation">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" opacity="0.3"></circle>
                    <path d="M7 8h10M7 12h10M7 16h10" opacity="0.6"></path>
                    <path d="M8 8h8a2 2 0 1 1 0 4H8a2 2 0 1 0 0 4h8" stroke-width="3"></path>
                </svg>
            </button>
        </div>
        <div class="drawer-content">
            <button class="menu-item active" data-category="mobile">Mobiles</button>
            <button class="menu-item" data-category="tablet">Tablets</button>
            <button class="menu-item" data-category="laptop">Laptops</button>
        </div>
    </div>

    <main class="container">
        <div id="save-banner" class="save-banner" style="display: none;">
            <span>⚠️ Unsaved changes detected. Download/replace <b>data.js</b> to persist.</span>
            <button id="main-download-btn" class="btn-primary btn-download-sm">Download Updates</button>
        </div>

        <div class="admin-grid">
            <section>
                <div class="admin-form-header">
                    <h2 id="form-title" class="heading-hero mb-1">Edit Dataset</h2>
                </div>
                
                <form id="add-device-form" class="admin-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" id="dev-brand" placeholder="e.g. Apple" required>
                    </div>
                    <div class="form-group">
                        <label>Device Name</label>
                        <input type="text" id="dev-name" placeholder="e.g. MacBook Pro M3" required>
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="url" id="dev-image" placeholder="https://example.com/image.png">
                    </div>
                    <div class="form-group">
                        <label>Price (INR)</label>
                        <input type="number" id="dev-price" placeholder="e.g. 79900">
                    </div>
                    
                    <div class="mb-3 mt-3">
                        <label class="flex-between">
                            Specifications
                        </label>
                        <div id="specs-container">
                            <!-- Field groups injected here -->
                        </div>
                    </div>

                    <div class="form-actions mb-3 mt-3">
                        <button type="submit" id="submit-btn" class="btn-primary flex-2">Apply to List</button>
                        <button type="button" id="cancel-edit" class="btn-secondary flex-1" style="display: none;">Cancel</button>
                    </div>
                </form>

            </section>

            <section class="preview-card-wrap">
                <h2>Live Preview</h2>
                <div id="preview-container" class="reveal visible"></div>
                
                <div class="excel-dropzone compact" id="excel-dropzone">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2"></path><path d="M8 17h2"></path><path d="M14 13h2"></path><path d="M14 17h2"></path></svg>
                    <h3 id="dropzone-title">Mass Management</h3>
                    <p class="text-secondary mb-2" id="dropzone-instruction">
                        Upload <span class="filename-badge" id="copy-filename-badge" title="Click to copy filename">
                            <b id="expected-filename">mobiles.xlsx</b>
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </span>
                    </p>
                    <div id="dropzone-status" class="error-text mb-1" style="display: none;"></div>
                    <input type="file" id="excel-input" accept=".xlsx, .xls, .csv" style="display: none;">
                </div>
                
                <div class="sidebar-card">
                    <div class="local-db-header">
                        <h3>Local Database</h3>
                        <button id="export-excel-btn" class="btn-secondary btn-sm">Export (.xlsx)</button>
                    </div>
                    <div id="local-db-list" class="local-db-scroll">
                        <!-- List generated by JS -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="mobiles.js"></script>
    <script src="tablets.js"></script>
    <script src="laptops.js"></script>
    <script src="utils.js"></script>
    <script src="admin.js"></script>
</body>
</html>
